<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="score-container">
                <h3>HOME</h3>
                <p class="score" id="home">0</p>
                <div>
                    <ul class="add-point-wrapper">
                        <li onclick="add1Home()">+1</li>
                        <li onclick="add2Home()">+2</li>
                        <li onclick="add3Home()">+3</li>
                    </ul>
                </div>
            </div>
            <div class="score-container">
                <h3>AWAY</h3>
                <p class="score" id="guest">0</p>
                <div>
                    <ul class="add-point-wrapper">
                        <li onclick="add1Guest()">+1</li>
                        <li onclick="add2Guest()">+2</li>
                        <li onclick="add3Guest()">+3</li>
                    </ul>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
